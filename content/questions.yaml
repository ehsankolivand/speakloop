schema_version: 1
questions:
  - id: activity-rotation-callbacks
    question: |
      Walk me through what happens to an Activity when the user rotates the device. Just the callbacks, in order.
    ideal_answer: |
      By default, from API 24 up to Android 16 which is API 36, a rotation is a configuration change. The system tears the Activity down and builds a new one.

      On the old instance, the callbacks fire in this order: onPause, then onStop, then onSaveInstanceState with a Bundle, then onDestroy.

      Then the system creates a new Activity instance and runs it through onCreate, which receives the saved Bundle, then onStart, then onRestoreInstanceState, then onResume.

      On the outgoing instance, isChangingConfigurations returns true. That is how ComponentActivity knows to hand its ViewModelStore to the new instance through onRetainNonConfigurationInstance, instead of clearing it.

      One important note: this order of onStop and onSaveInstanceState is the API 28 and newer behavior. On API 27 and earlier, the order was onPause, then onSaveInstanceState, then onStop.

      Starting from Android 16, which is API 36, the official behavior changes page says that orientation, resizability, and aspect ratio restrictions no longer apply on displays with a smallest width of 600dp or more, for apps targeting API 36. So this sequence fires more often than before on tablets and foldables. There is a temporary opt-out called PROPERTY_COMPAT_ALLOW_RESTRICTED_RESIZABILITY, but it is removed completely at API 37.
    tags: [android, activity, lifecycle, core]
    difficulty: medium

  - id: activity-destroyed-definition
    question: |
      When an Activity goes through a configuration change like rotation, we often say it is destroyed and recreated. Define what destroyed means precisely, without using the words destroy, kill, or recreate.
    ideal_answer: |
      The Activity Java object becomes unreachable from the framework.

      ActivityThread releases its reference in ActivityClientRecord. The window is detached. The view hierarchy is disconnected. Lifecycle observers receive ON_DESTROY. The instance becomes eligible for garbage collection.

      The OS process itself usually stays alive. Only this one Java object goes away.

      Anything held only by that instance is gone. That includes member fields, view references, and listeners.

      Anything held by something with a longer scope survives. That includes the ViewModelStore retained through NonConfigurationInstances, Application singletons, static fields, and the serialized Bundle inside SavedStateRegistry.
    tags: [android, activity, lifecycle, internals]
    difficulty: medium

  - id: onpause-vs-onstop-process-guarantee
    question: |
      Between onPause and onStop, which one is guaranteed to run before the OS can take your process? Be specific.
    ideal_answer: |
      Neither is fully guaranteed under all conditions, but onPause is the stronger guarantee.

      onPause runs synchronously before any other Activity can resume. The framework documents that an app is not killable until after onPause returns.

      Since Honeycomb, which is API 11, the process is also not considered killable until onStop returns under normal flow. But onStop can be skipped if the system is under extreme memory pressure, or if the user force stops the app.

      The practical rule is simple. Write nothing critical in onStop that you would not accept losing. Do lightweight commits in onPause, and use onSaveInstanceState for UI state.
    tags: [android, activity, lifecycle, process]
    difficulty: hard

  - id: onstop-savedinstancestate-api28-ordering
    question: |
      What changed about the ordering of onStop and onSaveInstanceState after API 28, and why does it matter for fragment transactions?
    ideal_answer: |
      Before Android 9, which is API 28, onSaveInstanceState ran before onStop. Starting from API 28, the platform calls onSaveInstanceState after onStop.

      Here is the consequence. Before Pie, if you called FragmentTransaction commit between onSaveInstanceState and onStop, it threw an IllegalStateException with the message "Can not perform this action after onSaveInstanceState".

      With the new ordering from API 28 and later, the state saved flag inside FragmentManager flips at onStop. So a fragment transaction issued after onPause but before onStop is now safe.

      The pre Pie workaround was to use commitAllowingStateLoss, or to move the commit earlier. On API 28 and newer, the window where this bug could fire is eliminated, as long as you stop doing work in onStop.
    tags: [android, activity, lifecycle, fragments, api-changes]
    difficulty: hard

  - id: behavioral-anr-debugging
    type: behavioral
    question: |
      Tell me about a time you had to debug a difficult ANR or performance problem in an Android app. What did you do?
    ideal_answer: |
      A strong STAR answer covers four parts. Situation: set the scene — which app, what the user impact was (for example, the app froze on startup for some users). Task: state your responsibility — you owned finding and fixing the root cause. Action: describe the concrete steps in past tense — you reproduced it, captured a trace with the Android profiler or the ANR traces in the bug report, found the main thread was blocked on a synchronous disk or network call, and moved that work to a background dispatcher. Result: state the measurable outcome — ANRs dropped to near zero, startup time improved, and you added a StrictMode check to catch regressions.

      Keep it in the past tense, make your own actions the focus (use "I", not "we", for what you did), and end with a concrete, ideally quantified result.
    tags: [android, behavioral, star, performance, anr]
    difficulty: medium

  - id: hypothetical-startup-anr
    type: hypothetical
    question: |
      If your app started ANRing on startup only on low-end devices after a release, how would you investigate and fix it?
    ideal_answer: |
      A good answer reasons in conditionals and future steps. First, I would confirm and scope it: if the ANRs are concentrated on low-end devices, I would check Play Console vitals and the ANR rate by device and Android version. Then I would reproduce: if I can get a low-end device or throttle a profiler, I would capture a startup trace. I would look for main-thread work that would block longer on slow hardware — synchronous I/O, large JSON parsing, or eager initialization in Application.onCreate.

      If the cause were heavy initialization, I would move non-critical work off the startup path, defer it with App Startup or a background dispatcher, and lazy-initialize. If it were a third-party SDK, I would initialize it asynchronously. Finally, I would add a guardrail: a StrictMode policy and a startup-time metric, so a regression would surface before release. Throughout, the answer should use conditionals ("if … I would …") because the scenario is hypothetical.
    tags: [android, hypothetical, anr, startup, performance]
    difficulty: medium
