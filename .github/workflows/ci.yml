name: CI

# The test suite guards hard constitution invariants — offline default path,
# function-local engine imports, byte-identical serial-vs-concurrent reports,
# CLAUDE.md line budgets, no personal absolute paths. Run it on every push and PR so a
# regression is caught immediately instead of only when someone remembers `uv run pytest`.
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # arm64 is REQUIRED: the mlx / kokoro-mlx / parakeet-mlx wheels are Apple-Silicon-only
    # and will not install on Ubuntu. GitHub's macos-14 runners are arm64.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (project + dev group)
        run: uv sync

      - name: Type-check the pure-logic modules
        # mypy is scoped in [tool.mypy] to the engine-free modules (srs/store/coverage/metrics
        # + the pure pronunciation GOP/drill loop); the version is lockfile-pinned so CI matches
        # local. Green today (IMP-020) — a type regression in those modules fails the build.
        run: uv run mypy

      - name: Run the default test suite
        # `addopts` already deselects live_download/live_cloud/live_pron; live_asr/live_llm
        # self-skip without models. No model download happens here, so the offline runtime
        # constraint is untouched — this is dev tooling, not the runtime path.
        run: uv run pytest
