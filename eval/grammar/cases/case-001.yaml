id: case-001
source: synthetic
l1: persian
transcripts:
  - "I really like to programming in my free time and I enjoy to build small tools."
gold_issues:
  - attempt_ordinal: 1
    quote: "like to programming"
    label: "gerund/infinitive confusion"
    correction: "like programming"
    explanation: "After 'like', English takes the gerund, not 'to' + a verb."
  - attempt_ordinal: 1
    quote: "enjoy to build"
    label: "gerund/infinitive confusion"
    correction: "enjoy building"
    explanation: "'enjoy' takes a gerund complement."
notes: "Two clear gerund/infinitive errors in one attempt."
