# Bundled read-aloud pronunciation drill bank (016). Shipped in-package; read-only at
# runtime; NO network / g2p / NLTK is used to read it (research D2).
#
# `canonical` holds the model's espeak-IPA phoneme symbols (validated against the model
# vocab.json — stress-less). The CTC blank is the model's <pad> token (id 0). Symbols were
# hand-authored from English→espeak-IPA and should be re-validated against the model on the
# first real run (a tiny dev script: TTS the prompt → run the model → compare greedy decode).
# The flag decision centres on each drill's `targets` (the contrast phone), where the symbol
# is unambiguous, so minor vowel-symbol drift elsewhere does not change the contrast check.
#
# NOTE on "wrapper/rapper": in standard English the <wr> is /ɹ/ (silent w), so those are
# homophones — the real /w/–/r/ contrast lives in true minimal pairs (west/rest, wing/ring).
version: 1

contrasts:
  - id: w_r
    expected: "w"
    competitors: ["ɹ", "r"]
    tip: "Round your lips for 'w' — don't curl your tongue back like 'r'. Say 'wuh', not 'ruh'."
  - id: v_w
    expected: "v"
    competitors: ["w"]
    tip: "For 'v', press your top teeth on your bottom lip and add voice. Lips don't round."
  - id: th_s
    expected: "θ"
    competitors: ["s", "t", "f"]
    tip: "For 'th' (think), put your tongue tip lightly between your teeth and blow — not 's'."
  - id: th_d
    expected: "ð"
    competitors: ["d", "z"]
    tip: "Voiced 'th' (this): tongue between the teeth with voice on — not a hard 'd'."
  - id: ih_iy
    expected: "ɪ"
    competitors: ["iː", "i"]
    tip: "Short 'ɪ' (ship) is relaxed and quick — not the long 'ee' in 'sheep'."
  - id: l_r
    expected: "l"
    competitors: ["ɹ", "r"]
    tip: "For 'l', touch your tongue tip to the ridge just behind your top teeth."

drills:
  # --- /w/ vs /r/ ---------------------------------------------------------------
  - id: west
    contrast_id: w_r
    prompt: "west"
    canonical: ["w", "ɛ", "s", "t"]
    targets: [{index: 0, word: "west"}]
    is_base: true
  - id: wing
    contrast_id: w_r
    prompt: "wing"
    canonical: ["w", "ɪ", "ŋ"]
    targets: [{index: 0, word: "wing"}]
  - id: weed
    contrast_id: w_r
    prompt: "weed"
    canonical: ["w", "iː", "d"]
    targets: [{index: 0, word: "weed"}]
  # --- /v/ vs /w/ ---------------------------------------------------------------
  - id: vest
    contrast_id: v_w
    prompt: "vest"
    canonical: ["v", "ɛ", "s", "t"]
    targets: [{index: 0, word: "vest"}]
    is_base: true
  - id: van
    contrast_id: v_w
    prompt: "van"
    canonical: ["v", "æ", "n"]
    targets: [{index: 0, word: "van"}]
  - id: vine
    contrast_id: v_w
    prompt: "vine"
    canonical: ["v", "aɪ", "n"]
    targets: [{index: 0, word: "vine"}]
  # --- /θ/ vs /s/ ---------------------------------------------------------------
  - id: thin
    contrast_id: th_s
    prompt: "thin"
    canonical: ["θ", "ɪ", "n"]
    targets: [{index: 0, word: "thin"}]
    is_base: true
  - id: think
    contrast_id: th_s
    prompt: "think"
    canonical: ["θ", "ɪ", "ŋ", "k"]
    targets: [{index: 0, word: "think"}]
  - id: thick
    contrast_id: th_s
    prompt: "thick"
    canonical: ["θ", "ɪ", "k"]
    targets: [{index: 0, word: "thick"}]
  # --- /ð/ vs /d/ ---------------------------------------------------------------
  - id: this
    contrast_id: th_d
    prompt: "this"
    canonical: ["ð", "ɪ", "s"]
    targets: [{index: 0, word: "this"}]
    is_base: true
  - id: they
    contrast_id: th_d
    prompt: "they"
    canonical: ["ð", "eɪ"]
    targets: [{index: 0, word: "they"}]
  - id: that
    contrast_id: th_d
    prompt: "that"
    canonical: ["ð", "æ", "t"]
    targets: [{index: 0, word: "that"}]
  # --- /ɪ/ vs /iː/ (vowel target, index 1) --------------------------------------
  - id: ship
    contrast_id: ih_iy
    prompt: "ship"
    canonical: ["ʃ", "ɪ", "p"]
    targets: [{index: 1, word: "ship"}]
    is_base: true
  - id: sit
    contrast_id: ih_iy
    prompt: "sit"
    canonical: ["s", "ɪ", "t"]
    targets: [{index: 1, word: "sit"}]
  - id: bit
    contrast_id: ih_iy
    prompt: "bit"
    canonical: ["b", "ɪ", "t"]
    targets: [{index: 1, word: "bit"}]
  # --- /l/ vs /r/ ---------------------------------------------------------------
  - id: light
    contrast_id: l_r
    prompt: "light"
    canonical: ["l", "aɪ", "t"]
    targets: [{index: 0, word: "light"}]
  - id: lead
    contrast_id: l_r
    prompt: "lead"
    canonical: ["l", "iː", "d"]
    targets: [{index: 0, word: "lead"}]
  - id: lice
    contrast_id: l_r
    prompt: "lice"
    canonical: ["l", "aɪ", "s"]
    targets: [{index: 0, word: "lice"}]
