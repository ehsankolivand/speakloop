# speakloop Persian-L1 English error catalog
#
# Loaded once by feedback/catalog.py into frozen dataclasses (one parse at
# import; a malformed file fails loudly at load, not mid-session).
#
# This catalog is the source of accurate labels, learner-facing transfer
# reasons (the "Because:" line), and the deterministic impact ranking used to
# order grammar patterns (FR-001..FR-005). Entries trace to
# doc/research_methodology.md §1.1 (impact ranking) and §1.3 (pattern→mechanism
# mapping) — Constitution Principle X.
#
# The open-bucket mechanism is preserved: the analyzer may surface patterns not
# listed here; those are admitted with a fixed default impact_rank BELOW all
# catalog entries and require occurrence_count >= 2 (FR-002).

# Independent of the report frontmatter schema_version. Lets the catalog evolve
# without touching the report schema.
catalog_version: 1

entries:

  - id: gerund-infinitive-confusion
    label: gerund/infinitive confusion
    transfer_reason: >
      Persian does not split verbs into "-ing" vs "to" complements the way
      English does, so learners pick the wrong form after verbs like "like",
      "enjoy", "avoid".
    impact_rank: 2
    detection_hints:
      - "verb + 'to' + '-ing' (e.g. 'like to programming')"
      - "verb + bare gerund where infinitive is required (and vice versa)"
    examples:
      - { wrong: "I like to programming", right: "I like programming" }
      - { wrong: "I enjoy to work here", right: "I enjoy working here" }
    methodology_ref: "§1.3 pattern 4 (cross-form blending); §2.1"

  - id: comparative-form
    label: comparative form error
    transfer_reason: >
      Persian forms comparatives analytically; learners over-extend "-er"/"bigger"
      or use the wrong adjective instead of "more + adjective".
    impact_rank: 2
    detection_hints:
      - "'bigger/more' misuse in comparison"
      - "double comparative or wrong comparative adjective"
    examples:
      - { wrong: "I like my job even bigger than ten years ago",
          right: "I like my job even more than ten years ago" }
    methodology_ref: "§1.3 pattern 5 (L1 transfer)"

  - id: plural-agreement
    label: plural/singular agreement
    transfer_reason: >
      Persian does not mark plural on a noun after a number, so learners drop the
      English plural -s ("eight year" instead of "eight years").
    impact_rank: 3
    detection_hints:
      - "number + singular count noun ('eight year', 'three principle')"
      - "missing plural -s on a clearly plural referent"
    examples:
      - { wrong: "eight year experience", right: "eight years of experience" }
      - { wrong: "solid principle", right: "SOLID principles" }
    methodology_ref: "§1.3 patterns 1/4"

  - id: article-omission-common
    label: definite/indefinite article omission (common nouns)
    transfer_reason: >
      Persian has no definite article and no obligatory indefinite article, so
      learners omit "a/an/the" before English singular count nouns.
    impact_rank: 4
    detection_hints:
      - "singular count noun with no article ('on dispatcher', 'use library')"
    examples:
      - { wrong: "Coroutine runs on dispatcher",
          right: "A coroutine runs on a dispatcher" }
    methodology_ref: "§1.3 pattern 7; §1.1 row 4"

  - id: preposition-substitution
    label: preposition substitution / non-standard preposition
    transfer_reason: >
      Persian prepositions map non-isomorphically onto English; learners
      substitute a close-but-wrong preposition.
    impact_rank: 4
    detection_hints:
      - "non-standard preposition after a verb/noun"
    examples:
      - { wrong: "depend on this solution to scale",
          right: "depend upon this solution to scale" }
    methodology_ref: "§1.3 pattern 5; §1.1 row 4"

  - id: 3sg-s-drop
    label: 3rd-person singular -s drop
    transfer_reason: >
      English inter-phrasal subject–verb agreement (Stage 5) is not required in
      Persian and is the slowest morpheme to stabilise under speech load.
    impact_rank: 3
    detection_hints:
      - "3rd-person singular subject + bare verb ('he go', 'the system handle')"
    examples:
      - { wrong: "the system handle retries", right: "the system handles retries" }
    methodology_ref: "§1.1 row 3; §1.3 pattern 1"

  - id: aux-drop
    label: auxiliary be/do drop
    transfer_reason: >
      The English auxiliary (am/is/are/do) carries agreement that Persian encodes
      differently, so it is dropped under production pressure.
    impact_rank: 3
    detection_hints:
      - "missing auxiliary ('I studying', 'where you go')"
    examples:
      - { wrong: "I studying the trade-offs", right: "I am studying the trade-offs" }
    methodology_ref: "§1.1 row 3; §1.3 pattern 2"

  - id: possessor-order
    label: possessor-order transfer (ezafe)
    transfer_reason: >
      Persian's post-nominal ezafe possessor maps to English 's/of, so learners
      produce "my friend brother" for "my friend's brother".
    impact_rank: 4
    detection_hints:
      - "noun + noun possessor without 's/of"
    examples:
      - { wrong: "my friend brother", right: "my friend's brother" }
    methodology_ref: "§1.3 pattern 5"

# NOTE: impact_rank values above are derived from doc/research_methodology.md
# §1.1's ranking (inflectional proceduralisation and high-salience form errors
# rank above article/preposition transfer for interview comprehensibility).
# Open-bucket patterns receive a fixed default impact_rank greater than every
# value here so they always sort last among findings (see feedback/catalog.py
# OPEN_BUCKET_IMPACT_RANK).
